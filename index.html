<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cian Moran — Demo Investment Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<style>
/* ── Design Tokens ──────────────────────────────────────────────────────────── */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#ffffff;
  --color-border:#d4d1ca;--color-divider:#e0ddd9;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-success:#437a22;--color-error:#a12c7b;
  --color-gold:#d19900;--color-blue:#006494;--color-purple:#7a39bb;
  --color-orange:#da7101;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --font-body:'Inter',sans-serif;--font-display:'Instrument Serif',Georgia,serif;
  --radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
}
[data-theme="dark"]{
  --color-bg:#0f1117;--color-surface:#161b22;--color-surface-2:#1c2128;
  --color-border:#30363d;--color-divider:#21262d;
  --color-text:#e6edf3;--color-text-muted:#8b949e;--color-text-faint:#484f58;
  --color-primary:#4f98a3;--color-primary-hover:#3d8590;
  --color-success:#3fb950;--color-error:#f85149;
  --color-gold:#d29922;--color-blue:#58a6ff;--color-purple:#bc8cff;
  --color-orange:#ffa657;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);
}

/* ── Base Reset ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:1rem;color:var(--color-text);background:var(--color-bg);min-height:100dvh;transition:background .2s,color .2s}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
table{border-collapse:collapse;width:100%}

/* ── Layout ─────────────────────────────────────────────────────────────────── */
.container{max-width:1200px;margin-inline:auto;padding-inline:1.5rem}

/* ── Header ─────────────────────────────────────────────────────────────────── */
header{background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-block:.875rem;gap:1rem}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.logo-text h1{font-family:var(--font-display);font-size:1.1rem;font-weight:400;line-height:1.2}
.logo-text p{font-size:.75rem;color:var(--color-text-muted);margin-top:.1rem}
.header-right{display:flex;align-items:center;gap:.75rem}
.live-badge{display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-success);background:color-mix(in oklch,var(--color-success) 12%,transparent);padding:.25rem .625rem;border-radius:9999px;border:1px solid color-mix(in oklch,var(--color-success) 30%,transparent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--color-success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-toggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);border:1px solid var(--color-border);color:var(--color-text-muted);transition:all .18s}
.theme-toggle:hover{background:var(--color-surface-2);color:var(--color-text)}

/* ── Loading ─────────────────────────────────────────────────────────────────── */
.loading-screen{position:fixed;inset:0;background:var(--color-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;transition:opacity .4s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.875rem;color:var(--color-text-muted)}

/* ── Error ───────────────────────────────────────────────────────────────────── */
.error-banner{background:color-mix(in oklch,var(--color-error) 10%,transparent);border:1px solid color-mix(in oklch,var(--color-error) 30%,transparent);color:var(--color-error);padding:1rem 1.5rem;border-radius:var(--radius-md);margin:1.5rem 0;font-size:.875rem;display:none}

/* ── Main ────────────────────────────────────────────────────────────────────── */
main{padding-block:2rem}
.section-gap{margin-bottom:2rem}

/* ── KPI Grid ────────────────────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;box-shadow:var(--shadow-sm)}
.kpi-label{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:.5rem}
.kpi-value{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
.kpi-delta{font-size:.8rem;font-weight:500;margin-top:.4rem;font-variant-numeric:tabular-nums}
.up{color:var(--color-success)}.down{color:var(--color-error)}.neutral{color:var(--color-text-muted)}

/* ── Charts Grid ─────────────────────────────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr;gap:1.5rem;margin-bottom:2rem}
@media(min-width:900px){.charts-grid{grid-template-columns:2fr 1fr}}
.chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow-sm)}
.chart-title{font-size:.8rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:1.25rem}
.chart-wrap{position:relative;height:260px}

/* ── Table Card ──────────────────────────────────────────────────────────────── */
.table-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:2rem}
.table-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--color-divider);display:flex;align-items:center;justify-content:space-between}
.table-header h2{font-size:.8rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted)}
.table-wrap{overflow-x:auto}
table th{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-muted);padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--color-divider);white-space:nowrap;background:var(--color-surface)}
table td{font-size:.875rem;padding:.75rem 1rem;border-bottom:1px solid var(--color-divider);font-variant-numeric:tabular-nums;white-space:nowrap}
table tr:last-child td{border-bottom:none}
table tr:hover td{background:color-mix(in oklch,var(--color-primary) 5%,transparent)}

/* ── Badges ──────────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:600;letter-spacing:.03em}
.badge-equity{background:color-mix(in oklch,var(--color-blue) 15%,transparent);color:var(--color-blue)}
.badge-fixed-income{background:color-mix(in oklch,var(--color-purple) 15%,transparent);color:var(--color-purple)}
.badge-infrastructure{background:color-mix(in oklch,var(--color-orange) 15%,transparent);color:var(--color-orange)}
.badge-commodity{background:color-mix(in oklch,var(--color-gold) 15%,transparent);color:var(--color-gold)}
.badge-crypto{background:color-mix(in oklch,var(--color-success) 15%,transparent);color:var(--color-success)}

/* ── Footer ──────────────────────────────────────────────────────────────────── */
footer{border-top:1px solid var(--color-border);padding-block:1.5rem;margin-top:2rem}
.footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.footer-note{font-size:.75rem;color:var(--color-text-faint)}

/* ── Responsive (existing) ───────────────────────────────────────────────────── */
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .header-right .live-badge{display:none}
}

/* ════════════════════════════════════════════════════════════════════════════
   NEW CSS — extends above; no duplication of existing rules
   ════════════════════════════════════════════════════════════════════════════ */

/* Navigation */
nav.main-nav{display:flex;align-items:center;gap:.25rem}
nav.main-nav a{font-size:.8rem;font-weight:500;padding:.4rem .75rem;border-radius:var(--radius-md);color:var(--color-text-muted);text-decoration:none;transition:all .18s;white-space:nowrap}
nav.main-nav a:hover,nav.main-nav a.active{color:var(--color-text);background:color-mix(in oklch,var(--color-primary) 10%,transparent)}
.hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-md);border:1px solid var(--color-border)}
.mobile-nav{display:none;flex-direction:column;background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:.75rem 1.5rem;gap:.25rem}
.mobile-nav a{font-size:.875rem;padding:.5rem .75rem;border-radius:var(--radius-md);color:var(--color-text-muted);text-decoration:none}
.mobile-nav a.active,.mobile-nav a:hover{color:var(--color-text);background:color-mix(in oklch,var(--color-primary) 10%,transparent)}
@media(max-width:768px){nav.main-nav{display:none}.hamburger{display:flex}.mobile-nav.open{display:flex}}

/* Range pills */
.range-pills{display:flex;gap:.5rem;margin-bottom:1.5rem}
.range-pill{font-size:.75rem;font-weight:600;padding:.35rem .875rem;border-radius:9999px;border:1px solid var(--color-border);color:var(--color-text-muted);cursor:pointer;transition:all .18s;background:none}
.range-pill.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}

/* Section header */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem}
.section-header-left h2{font-family:var(--font-display);font-size:1.5rem;font-weight:400}
.section-header-left p{font-size:.875rem;color:var(--color-text-muted);margin-top:.25rem}
.section-header-actions{display:flex;gap:.5rem;flex-shrink:0}

/* Tabs */
.tabs-bar{display:flex;gap:0;border-bottom:1px solid var(--color-border);margin-bottom:1.5rem;overflow-x:auto}
.tab-btn{font-size:.8rem;font-weight:600;padding:.625rem 1.25rem;border-bottom:2px solid transparent;color:var(--color-text-muted);cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .18s}
.tab-btn.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Extended badges */
.badge-default{background:color-mix(in oklch,var(--color-text) 10%,transparent);color:var(--color-text-muted)}
.badge-success{background:color-mix(in oklch,var(--color-success) 15%,transparent);color:var(--color-success)}
.badge-warning{background:color-mix(in oklch,var(--color-gold) 15%,transparent);color:var(--color-gold)}
.badge-danger{background:color-mix(in oklch,var(--color-error) 15%,transparent);color:var(--color-error)}
.badge-info{background:color-mix(in oklch,var(--color-blue) 15%,transparent);color:var(--color-blue)}
.badge-purple{background:color-mix(in oklch,var(--color-purple) 15%,transparent);color:var(--color-purple)}
.badge-blue{background:color-mix(in oklch,var(--color-blue) 15%,transparent);color:var(--color-blue)}

/* KPI card variants */
.kpi-card.success{border-color:color-mix(in oklch,var(--color-success) 30%,transparent)}
.kpi-card.warning{border-color:color-mix(in oklch,var(--color-gold) 30%,transparent)}
.kpi-card.danger{border-color:color-mix(in oklch,var(--color-error) 30%,transparent)}
